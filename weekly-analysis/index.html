<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>花果畈 · 厨余垃圾收运量周数据分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f0f2f5;
  --card-bg: #ffffff;
  --header-bg: #1a1a2e;
  --header-bg2: #16213e;
  --text: #1e293b;
  --text-secondary: #64748b;
  --text-light: #e2e8f0;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --radius: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.1), 0 8px 32px rgba(0,0,0,0.08);
  --accent-blue: #4C72B0;
  --accent-green: #16a34a;
  --accent-orange: #DD8452;
  --accent-red: #e15759;
  --accent-cyan: #0891b2;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* Breadcrumb */
.breadcrumb-bar {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  font-size: 13px;
  color: var(--text-secondary);
}
.breadcrumb-bar a { color: var(--accent-blue); text-decoration: none; font-weight: 500; }
.breadcrumb-bar a:hover { text-decoration: underline; }
.breadcrumb-bar .sep { color: #94a3b8; margin: 0 8px; }

/* Header */
.site-header {
  background: linear-gradient(135deg, var(--header-bg), var(--header-bg2));
  color: var(--text-light);
  padding: 32px 40px;
  position: relative;
  overflow: hidden;
}
.site-header::after {
  content: '';
  position: absolute;
  top: -30%; right: -5%;
  width: 360px; height: 360px;
  background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
  border-radius: 50%;
}
.header-content {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}
.header-content h1 { font-size: 26px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
.header-content .subtitle { font-size: 13px; color: rgba(255,255,255,0.55); }
.header-meta {
  display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap;
  font-size: 12px; color: rgba(255,255,255,0.6);
}

/* Main */
.main-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 28px 24px 48px;
}

/* Section title */
.section-title {
  font-size: 18px; font-weight: 700; color: var(--text);
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}

/* Monthly KPI row */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}
.kpi-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  text-align: center;
  border-top: 3px solid transparent;
}
.kpi-card:nth-child(1) { border-top-color: var(--accent-blue); }
.kpi-card:nth-child(2) { border-top-color: var(--accent-green); }
.kpi-card:nth-child(3) { border-top-color: var(--accent-orange); }
.kpi-card:nth-child(4) { border-top-color: var(--accent-cyan); }
.kpi-card .label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.kpi-card .value { font-size: 30px; font-weight: 700; color: var(--text); line-height: 1.2; }
.kpi-card .unit { font-size: 14px; color: var(--text-secondary); margin-left: 2px; font-weight: 400; }
.kpi-card .sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* Report list */
.report-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 28px;
}

/* Week card */
.week-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow 0.25s ease;
  border-left: 5px solid transparent;
}
.week-card:hover {
  box-shadow: var(--shadow-hover);
}
.week-card.rebound { border-left-color: var(--accent-green); }
.week-card.valley { border-left-color: var(--accent-red); }
.week-card.decline { border-left-color: var(--accent-orange); }
.week-card.baseline { border-left-color: var(--accent-blue); }

/* Card header - always visible */
.card-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 24px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.card-header:hover { background: #f8fafc; }
.card-header .week-badge {
  font-size: 20px;
  font-weight: 700;
  min-width: 80px;
  text-align: center;
}
.card-header .week-info {
  flex: 1;
  min-width: 0;
}
.card-header .week-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.card-header .week-dates {
  font-size: 13px;
  color: var(--text-secondary);
}
.card-header .mini-kpis {
  display: flex;
  gap: 24px;
  align-items: center;
  flex-shrink: 0;
}
.mini-kpi { text-align: right; }
.mini-kpi .mk-label { font-size: 11px; color: var(--text-secondary); }
.mini-kpi .mk-value { font-size: 22px; font-weight: 700; }
.mini-kpi .mk-value .mk-unit { font-size: 12px; font-weight: 400; color: var(--text-secondary); }
.mini-kpi .mk-change { font-size: 11px; margin-top: 2px; }
.mk-change.up { color: var(--accent-green); }
.mk-change.down { color: var(--accent-red); }
.mk-change.neutral { color: var(--text-secondary); }

.card-expand-icon {
  font-size: 14px;
  color: var(--text-secondary);
  transition: transform 0.3s ease;
  width: 24px;
  text-align: center;
  flex-shrink: 0;
}
.week-card.expanded .card-expand-icon { transform: rotate(180deg); }

/* Card summary (always visible when collapsed) */
.card-summary {
  padding: 0 24px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.card-summary .trend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 6px;
}

/* Card body - expanded content */
.card-body {
  display: none;
  padding: 20px 24px 24px;
  animation: fadeIn 0.3s ease;
}
.week-card.expanded .card-body { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

/* Inside expanded body */
.body-chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.body-chart-card {
  background: #f8fafc;
  border-radius: 10px;
  padding: 16px;
  border: 1px solid var(--border-light);
}
.body-chart-card h4 {
  font-size: 14px; font-weight: 600; margin-bottom: 10px;
  color: var(--text); padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.body-chart-card canvas { max-height: 300px; }
.body-chart-card.full { grid-column: 1 / -1; }

/* Detail table */
.detail-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 12px;
}
.detail-table th {
  background: #f8fafc;
  text-align: left;
  padding: 10px 14px;
  font-weight: 600;
  color: var(--text-secondary);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 2px solid var(--border);
}
.detail-table td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border-light);
}
.detail-table tr:last-child td { border-bottom: none; }
.detail-table tr:hover td { background: #f8fafc; }
.detail-table .total-row td {
  font-weight: 700;
  background: #f8fafc;
  border-top: 2px solid var(--border);
}

.peak-cell { color: var(--accent-red); font-weight: 600; }
.valley-cell { color: var(--accent-green); font-weight: 600; }

/* Bottom-10 Vehicle Table */
.bottom10-card {
  background: linear-gradient(135deg, #fef2f2 0%, #fff5f5 100%);
  border: 1px solid #fecaca;
  border-radius: 10px;
  padding: 16px;
  margin-top: 16px;
}
.bottom10-card h4 {
  font-size: 14px; font-weight: 600;
  margin-bottom: 10px;
  color: #b91c1c;
  padding-bottom: 8px;
  border-bottom: 1px solid #fecaca;
  display: flex; align-items: center; gap: 8px;
}
.bottom10-card .warn-icon { font-size: 18px; }
.vehicle-table .warn-row td { background: #fef2f2; }
.vehicle-table .warn-row:hover td { background: #fee2e2; }
.vehicle-table .decline-reasons {
  font-size: 11px;
  color: #b91c1c;
  max-width: 260px;
  line-height: 1.5;
}
.vehicle-table .mom-down { color: #b91c1c; font-weight: 600; }
.vehicle-table .mom-up { color: #16a34a; }
.vehicle-table .mom-neutral { color: #64748b; }
.vehicle-table th { white-space: nowrap; }
.vehicle-table td { white-space: nowrap; }
.vehicle-table td.reason-cell { white-space: normal; }

/* Dual ranking row */
.ranking-duo {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 16px;
}
.ranking-card {
  border-radius: 10px;
  padding: 16px;
  border: 1px solid var(--border-light);
}
.ranking-card.top { background: #f0fdf4; border-color: #bbf7d0; }
.ranking-card.bottom { background: #fef2f2; border-color: #fecaca; }
.ranking-card h4 {
  font-size: 14px; font-weight: 600;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid;
  display: flex; align-items: center; gap: 8px;
}
.ranking-card.top h4 { color: #166534; border-color: #bbf7d0; }
.ranking-card.bottom h4 { color: #991b1b; border-color: #fecaca; }

@media (max-width: 768px) {
  .ranking-duo { grid-template-columns: 1fr; }
}

.section-subtitle {
  font-size: 14px; font-weight: 600;
  color: var(--text);
  margin: 20px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-light);
}

/* Anomaly bars */
.anomaly-bar {
  display: flex; gap: 8px; align-items: center; margin-top: 4px;
}
.anomaly-bar .seg {
  height: 6px; border-radius: 3px;
}
.anomaly-bar .seg.medium { background: var(--accent-orange); }
.anomaly-bar .seg.low { background: #94a3b8; }
.anomaly-bar .label { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }

/* Footer */
.site-footer {
  text-align: center;
  padding: 24px;
  color: var(--text-secondary);
  font-size: 12px;
  border-top: 1px solid var(--border);
}

/* Loading & empty */
.loading-placeholder {
  text-align: center; padding: 60px 20px; color: var(--text-secondary);
}
.spinner {
  display: inline-block; width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 768px) {
  .site-header { padding: 24px 20px; }
  .header-content h1 { font-size: 20px; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .card-header { flex-wrap: wrap; gap: 10px; padding: 14px 16px; }
  .card-header .mini-kpis { width: 100%; justify-content: space-around; }
  .body-chart-row { grid-template-columns: 1fr; }
  .main-container { padding: 16px 12px 32px; }
  .card-summary { padding: 0 16px 12px; }
  .card-body { padding: 12px 16px 20px; }
}
@media print {
  .card-body { display: block !important; }
  .week-card { break-inside: avoid; border: 1px solid #ccc; }
  .site-header { background: #333 !important; -webkit-print-color-adjust: exact; }
}
</style>
</head>
<body>

<div class="breadcrumb-bar">
  <a href="../">🏠 看板中心</a>
  <span class="sep">/</span>
  <span>厨余垃圾收运量周数据分析</span>
</div>

<header class="site-header">
  <div class="header-content">
    <h1>📋 花果畈 · 厨余垃圾收运量周数据分析</h1>
    <div class="subtitle">岳阳市厨余垃圾资源化利用和无害化处置项目 — 6月全周度收运数据分析</div>
    <div class="header-meta">
      <span>📅 分析范围：2026年6月1日 — 6月28日（4周 · 28天）</span>
      <span>📊 数据来源：金山文档「每日数据-花果畈」</span>
      <span id="data-status">🔄 加载中…</span>
    </div>
  </div>
</header>

<div class="main-container">

  <!-- Monthly KPI -->
  <div class="kpi-row" id="monthly-kpi"></div>

  <!-- Report list -->
  <div class="section-title">
    <span>📑</span> 报告列表
    <span style="font-size:12px;font-weight:400;color:var(--text-secondary);margin-left:auto;" id="report-count"></span>
  </div>

  <div class="report-list" id="report-list">
    <div class="loading-placeholder">
      <div class="spinner"></div>
      <p>正在加载周度报告数据...</p>
    </div>
  </div>

</div>

<footer class="site-footer">
  <p>&copy; 2026 湖南伏泰环境科技有限责任公司 · 数据自动同步 · 历史记录永久保留</p>
</footer>

<!-- ==================== Scripts ==================== -->
<script>
// ---- Constants ----
const DATA_BASE = '.';
const WEEK_FILES = {
  23: 'w23_data.json',
  24: 'w24_data.json',
  25: 'w25_data.json',
  26: 'w26_data.json'
};

// ---- State ----
let allWeeks = [];
let expandedWeek = null;
let activeChart = null;  // single chart instance, reused

// ---- Utilities ----
function fmtNum(n, d) {
  if (n === null || n === undefined) return '-';
  d = d || 0;
  return Number(n).toLocaleString('zh-CN', { maximumFractionDigits: d });
}
function fmtPct(n) { return (Number(n) || 0).toFixed(1) + '%'; }

// ---- Load data for a specific week ----
async function loadWeekData(weekNum) {
  const file = WEEK_FILES[weekNum];
  if (!file) return null;
  try {
    const resp = await fetch(DATA_BASE + '/' + file + '?ts=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return resp.json();
  } catch (e) {
    console.warn('Failed to load week ' + weekNum + ':', e);
    return null;
  }
}

// ---- Render monthly KPI ----
function renderMonthlyKPI(weeks) {
  const totalTon = weeks.reduce(function(s, w) { return s + w.total_ton; }, 0);
  const totalTrips = weeks.reduce(function(s, w) { return s + w.total_trips; }, 0);
  const avgDaily = totalTon / (weeks.length * 7);
  const peaks = weeks.map(function(w) { return w.peak.ton; });
  const valleys = weeks.map(function(w) { return w.valley.ton; });
  const maxPeak = Math.max.apply(null, peaks);
  const minValley = Math.min.apply(null, valleys);

  document.getElementById('monthly-kpi').innerHTML =
    '<div class="kpi-card">' +
      '<div class="label">6月总收运量</div>' +
      '<div class="value">' + fmtNum(totalTon, 1) + '<span class="unit">吨</span></div>' +
      '<div class="sub">目标 6140吨 · 完成率 ' + (totalTon / 6140 * 100).toFixed(1) + '%</div>' +
    '</div>' +
    '<div class="kpi-card">' +
      '<div class="label">日均收运量</div>' +
      '<div class="value">' + fmtNum(avgDaily, 1) + '<span class="unit">吨/日</span></div>' +
      '<div class="sub">总车次 ' + totalTrips + ' · 日均 ' + (totalTrips / 28).toFixed(1) + ' 车次</div>' +
    '</div>' +
    '<div class="kpi-card">' +
      '<div class="label">月内单日峰值</div>' +
      '<div class="value">' + fmtNum(maxPeak, 1) + '<span class="unit">吨</span></div>' +
      '<div class="sub">' + weeks.filter(function(w) { return Math.abs(w.peak.ton - maxPeak) < 0.01; }).map(function(w) { return w.peak.date; }).join('、') + '</div>' +
    '</div>' +
    '<div class="kpi-card">' +
      '<div class="label">月内单日谷值</div>' +
      '<div class="value">' + fmtNum(minValley, 1) + '<span class="unit">吨</span></div>' +
      '<div class="sub">' + weeks.filter(function(w) { return Math.abs(w.valley.ton - minValley) < 0.01; }).map(function(w) { return w.valley.date; }).join('、') + '</div>' +
    '</div>';
}

// ---- Render week card header ----
function renderCardHeader(w, idx) {
  var changeHtml = '';
  if (w.change_pct !== null && w.change_pct !== undefined) {
    var cls = w.change_pct > 0 ? 'up' : 'down';
    var sign = w.change_pct > 0 ? '+' : '';
    changeHtml = '<div class="mk-change ' + cls + '">' + sign + fmtPct(w.change_pct) + ' 环周</div>';
  } else {
    changeHtml = '<div class="mk-change neutral">基线周</div>';
  }

  return '<div class="card-header" onclick="toggleWeek(' + w.week + ', this)">' +
    '<div class="week-badge" style="color:' + w.trend_color + '">第' + w.week + '周</div>' +
    '<div class="week-info">' +
      '<div class="week-title">第' + w.week + '周 · ' + w.trend_label + '</div>' +
      '<div class="week-dates">📅 ' + w.date_range + '（' + w.days + '天）</div>' +
    '</div>' +
    '<div class="mini-kpis">' +
      '<div class="mini-kpi">' +
        '<div class="mk-label">周收运量</div>' +
        '<div class="mk-value">' + fmtNum(w.total_ton, 1) + '<span class="mk-unit"> 吨</span></div>' +
        changeHtml +
      '</div>' +
      '<div class="mini-kpi">' +
        '<div class="mk-label">日均</div>' +
        '<div class="mk-value">' + fmtNum(w.avg_daily_ton, 1) + '<span class="mk-unit"> 吨</span></div>' +
        '<div class="mk-change neutral">' + w.total_trips + ' 车次</div>' +
      '</div>' +
    '</div>' +
    '<span class="card-expand-icon">▼</span>' +
  '</div>' +
  '<div class="card-summary">' +
    '<span class="trend-dot" style="background:' + w.trend_color + '"></span>' +
    '<span>' + w.summary + '</span>' +
  '</div>' +
  '<div class="card-body" id="body-' + w.week + '">' +
    '<div style="text-align:center;padding:24px;color:var(--text-secondary);">点击展开以加载详细数据...</div>' +
  '</div>';
}

// ---- Render daily detail table ----
function renderDailyTable(w) {
  var rows = w.daily.map(function(d) {
    var changeCell = d.change_pct === null ? '<td>-</td>' :
      '<td style="color:' + (d.change_pct > 0 ? 'var(--accent-red)' : (d.change_pct < 0 ? 'var(--accent-green)' : 'var(--text-secondary)')) + '">' +
      (d.change_pct > 0 ? '+' : '') + d.change_pct.toFixed(1) + '%</td>';

    var rowClass = '';
    if (d.total === w.peak.kg) rowClass = ' peak-cell';
    else if (d.total === w.valley.kg) rowClass = ' valley-cell';

    return '<tr class="' + rowClass + '">' +
      '<td>' + d.date + '</td>' +
      '<td>' + d.weekday + '</td>' +
      '<td>' + fmtNum(d.total) + '</td>' +
      '<td>' + d.trips + '</td>' +
      changeCell +
      '</tr>';
  }).join('');

  return '<table class="detail-table">' +
    '<thead><tr><th>日期</th><th>星期</th><th>收运量 (kg)</th><th>车次</th><th>日环比</th></tr></thead>' +
    '<tbody>' + rows +
    '<tr class="total-row">' +
      '<td><strong>合计/均值</strong></td>' +
      '<td>' + w.days + '天</td>' +
      '<td><strong>' + fmtNum(w.total_kg) + '</strong></td>' +
      '<td><strong>' + w.total_trips + '</strong></td>' +
      '<td>日均 ' + fmtNum(w.avg_daily_kg) + ' kg</td>' +
    '</tr></tbody></table>';
}

// ---- Render region table (W26 only for now) ----
function renderRegionTable(w) {
  if (!w.regions || w.regions.length === 0) return '';
  var rows = w.regions.map(function(r, i) {
    var colors = ['#4e79a7', '#f28e2b', '#e15759', '#76b7b2', '#59a14f'];
    return '<tr>' +
      '<td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + colors[i] + ';margin-right:8px;"></span>' + r.name + '</td>' +
      '<td>' + fmtNum(r.kg) + '</td>' +
      '<td>' + r.pct.toFixed(1) + '%</td>' +
      '<td>' + r.trips + '</td>' +
      '<td>' + fmtNum(r.avg_per_trip) + '</td>' +
      '</tr>';
  }).join('');
  return '<div class="section-subtitle">🏘️ 各区域收运量明细</div>' +
    '<table class="detail-table">' +
    '<thead><tr><th>区域</th><th>周总量 (kg)</th><th>占比</th><th>车次</th><th>车均 (kg)</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table>';
}

// ---- Render top 10 vehicle table ----
function renderTopVehicleTable(w) {
  if (!w.vehicles_top10 || w.vehicles_top10.length === 0) return '';
  var rows = w.vehicles_top10.map(function(v, idx) {
    var rank = v.rank || (idx + 1);
    return '<tr>' +
      '<td>' + rank + '</td>' +
      '<td><strong>' + v.plate + '</strong></td>' +
      '<td>' + fmtNum(v.total_kg || v.kg) + '</td>' +
      '<td>' + (v.total_trips || v.trips) + '</td>' +
      '<td>' + fmtNum(v.avg_per_trip) + '</td>' +
      '<td>' + (v.attendance || v.days_active + '/7') + '</td>' +
      '</tr>';
  }).join('');
  return '<table class="detail-table vehicle-table">' +
    '<thead><tr><th>#</th><th>车牌号</th><th>周总量 (kg)</th><th>车次</th><th>车均 (kg)</th><th>出勤</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table>';
}

// ---- Render bottom 10 vehicle table with reasons ----
function renderBottomVehicleTable(w) {
  if (!w.vehicles_bottom10 || w.vehicles_bottom10.length === 0) return '';
  
  var weekAvg = w.total_kg / w.total_trips;  // overall weekly average per trip
  
  var rows = w.vehicles_bottom10.map(function(v, idx) {
    var kg = v.total_kg || v.kg;
    var trips = v.total_trips || v.trips;
    var momHtml = '';
    if (v.mom_change_pct !== null && v.mom_change_pct !== undefined) {
      if (v.mom_change_pct > 0) {
        momHtml = '<span class="mom-up">+' + v.mom_change_pct.toFixed(1) + '%</span>';
      } else if (v.mom_change_pct < 0) {
        momHtml = '<span class="mom-down">' + v.mom_change_pct.toFixed(1) + '%</span>';
      } else {
        momHtml = '<span class="mom-neutral">0%</span>';
      }
    } else {
      momHtml = '<span class="mom-neutral">基线</span>';
    }
    
    var reasons = v.decline_reasons || [];
    var reasonsHtml = reasons.length > 0 
      ? reasons.map(function(r) { return '<span style="display:inline-block;background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:3px;margin:1px;font-size:11px;">' + r + '</span>'; }).join(' ')
      : '<span style="color:#64748b;">正常</span>';
    
    return '<tr class="warn-row">' +
      '<td style="color:#991b1b;font-weight:700;">' + (10 - idx) + '</td>' +
      '<td><strong>' + v.plate + '</strong><div style="font-size:11px;color:#64748b;">' + (v.unit || '') + '</div></td>' +
      '<td>' + fmtNum(kg) + '</td>' +
      '<td>' + trips + '</td>' +
      '<td>' + fmtNum(v.avg_per_trip) + '</td>' +
      '<td>' + (v.attendance || v.days_active + '/7') + '</td>' +
      '<td>' + momHtml + '</td>' +
      '<td class="reason-cell"><div class="decline-reasons">' + reasonsHtml + '</div></td>' +
      '</tr>';
  }).join('');
  
  return '<div class="ranking-card bottom">' +
    '<h4>⚠️ 运力后10名·需关注车辆</h4>' +
    '<div style="font-size:11px;color:#991b1b;margin-bottom:8px;">🔍 排名依据：周收运总量(kg) │ 环比变化｜出勤率｜车均装载量</div>' +
    '<table class="detail-table vehicle-table">' +
    '<thead><tr><th>#</th><th>车牌号</th><th>周总量(kg)</th><th>车次</th><th>车均(kg)</th><th>出勤</th><th>环比</th><th>下滑原因</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table></div>';
}

// ---- Render combined vehicle rankings (top + bottom side by side) ----
function renderVehicleRankings(w) {
  var hasTop = w.vehicles_top10 && w.vehicles_top10.length > 0;
  var hasBottom = w.vehicles_bottom10 && w.vehicles_bottom10.length > 0;
  
  if (!hasTop && !hasBottom) return '';
  
  var html = '<div class="section-subtitle">🚛 运力排名分析</div>';
  
  if (hasTop && hasBottom) {
    html += '<div class="ranking-duo">' +
      '<div class="ranking-card top">' +
        '<h4>🏆 运力TOP10 · 高效车辆</h4>' +
        '<div style="font-size:11px;color:#166534;margin-bottom:8px;">📊 排名依据：周收运总量(kg) │ 车均装载量 │ 出勤率</div>' +
        renderTopVehicleTable(w) +
      '</div>' +
      renderBottomVehicleTable(w) +
    '</div>';
  } else if (hasTop) {
    html += '<div class="ranking-card top" style="margin-top:16px;">' +
      '<h4>🏆 运力TOP10 · 高效车辆</h4>' +
      '<div style="font-size:11px;color:#166534;margin-bottom:8px;">📊 排名依据：周收运总量(kg) │ 车均装载量 │ 出勤率</div>' +
      renderTopVehicleTable(w) +
    '</div>';
  } else if (hasBottom) {
    html += renderBottomVehicleTable(w);
  }
  
  return html;
}

// ---- Render daily chart ----
function renderDailyChart(w) {
  var labels = w.daily.map(function(d) { return d.date; });
  var values = w.daily.map(function(d) { return d.total; });
  var trips = w.daily.map(function(d) { return d.trips; });
  var bgColors = w.daily.map(function(d) {
    if (d.total === w.peak.kg) return 'rgba(225,87,89,0.7)';
    if (d.total === w.valley.kg) return 'rgba(89,161,79,0.7)';
    return 'rgba(76,114,176,0.6)';
  });
  var borderColors = w.daily.map(function(d) {
    if (d.total === w.peak.kg) return '#e15759';
    if (d.total === w.valley.kg) return '#59a14f';
    return '#4C72B0';
  });

  var canvas = document.getElementById('daily-chart-' + w.week);
  if (!canvas) return;

  // Destroy existing chart if any
  if (activeChart) {
    activeChart.destroy();
    activeChart = null;
  }

  activeChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '收运量 (kg)',
        data: values,
        backgroundColor: bgColors,
        borderColor: borderColors,
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              var idx = ctx.dataIndex;
              return '收运量: ' + fmtNum(ctx.raw) + ' kg · ' + trips[idx] + ' 车次';
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: false,
          ticks: { callback: function(v) { return (v/1000).toFixed(0) + 'k'; } }
        }
      }
    }
  });
}

// ---- Anomaly visualization ----
function renderAnomalyBar(w) {
  var total = w.anomalies_total;
  var med = w.anomalies_medium;
  var low = w.anomalies_low;
  var medPct = (med / total * 100).toFixed(0);
  var lowPct = (low / total * 100).toFixed(0);
  return '<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">' +
    '异常检测：共 <strong>' + total + '</strong> 项 ' +
    '<span style="color:var(--accent-orange);">中危 ' + med + '</span> · ' +
    '<span style="color:#94a3b8;">低危 ' + low + '</span>' +
    '<div class="anomaly-bar">' +
    '<span class="seg medium" style="width:' + medPct + '%"></span>' +
    '<span class="seg low" style="width:' + lowPct + '%"></span>' +
    '<span class="label">中危 ' + medPct + '% | 低危 ' + lowPct + '%</span>' +
    '</div></div>';
}

// ---- Toggle week expansion ----
async function toggleWeek(weekNum, headerEl) {
  var card = headerEl.parentElement;
  var body = document.getElementById('body-' + weekNum);

  if (card.classList.contains('expanded')) {
    // Collapse
    card.classList.remove('expanded');
    if (activeChart) { activeChart.destroy(); activeChart = null; }
    expandedWeek = null;
    return;
  }

  // Collapse any previously expanded
  if (expandedWeek !== null) {
    var prevCard = document.querySelector('.week-card.expanded');
    if (prevCard) prevCard.classList.remove('expanded');
    if (activeChart) { activeChart.destroy(); activeChart = null; }
  }

  // Expand this one
  card.classList.add('expanded');
  expandedWeek = weekNum;

  // Load data if not yet loaded
  if (body.getAttribute('data-loaded') !== 'true') {
    body.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-secondary);"><div class="spinner"></div><p>加载第' + weekNum + '周详细数据...</p></div>';

    var w = await loadWeekData(weekNum);
    if (!w) {
      body.innerHTML = '<div style="text-align:center;padding:24px;color:var(--accent-red);">数据加载失败，请稍后重试</div>';
      return;
    }

    // Merge into allWeeks if not there
    var existing = allWeeks.filter(function(x) { return x.week === weekNum; });
    if (existing.length === 0) allWeeks.push(w);

    body.setAttribute('data-loaded', 'true');
    body.innerHTML =
      '<div class="body-chart-row">' +
        '<div class="body-chart-card"><h4>📊 每日收运量趋势</h4><canvas id="daily-chart-' + weekNum + '"></canvas></div>' +
        '<div class="body-chart-card"><h4>📋 每日收运明细</h4>' + renderDailyTable(w) + '</div>' +
      '</div>' +
      renderAnomalyBar(w) +
      renderRegionTable(w) +
      renderVehicleRankings(w);

    // Render chart
    setTimeout(function() { renderDailyChart(w); }, 100);
  } else {
    // Re-render chart (may have been destroyed)
    var w = allWeeks.filter(function(x) { return x.week === weekNum; })[0];
    if (w) {
      setTimeout(function() { renderDailyChart(w); }, 100);
    }
  }
}

// ---- Main init ----
async function init() {
  // Load reports.json for the index
  var weeksData = [];
  var weekNums = [26, 25, 24, 23];  // Reverse chronological

  // Load summary data for all weeks (just header info)
  for (var i = 0; i < weekNums.length; i++) {
    try {
      var w = await loadWeekData(weekNums[i]);
      if (w) weeksData.push(w);
    } catch (e) {
      console.warn('Failed to load W' + weekNums[i], e);
    }
  }

  if (weeksData.length === 0) {
    document.getElementById('report-list').innerHTML =
      '<div class="loading-placeholder"><p>暂无报告数据</p></div>';
    document.getElementById('data-status').textContent = '⚠️ 数据加载失败';
    return;
  }

  allWeeks = weeksData;

  // Sort reverse chronological (W26 first)
  allWeeks.sort(function(a, b) { return b.week - a.week; });

  // Render monthly KPI
  renderMonthlyKPI(allWeeks);

  // Render report list
  document.getElementById('report-count').textContent =
    '共 ' + allWeeks.length + ' 周报告 · 按时间倒序排列';

  var listHtml = allWeeks.map(function(w) {
    return '<div class="week-card ' + w.trend + '">' + renderCardHeader(w) + '</div>';
  }).join('');

  document.getElementById('report-list').innerHTML = listHtml;
  document.getElementById('data-status').textContent =
    '✅ 已加载 ' + allWeeks.length + ' 周数据';

  // Auto-expand the most recent week (W26 by default)
  var firstCard = document.querySelector('.week-card');
  if (firstCard) {
    var firstHeader = firstCard.querySelector('.card-header');
    if (firstHeader) {
      await toggleWeek(allWeeks[0].week, firstHeader);
    }
  }
}

// Start
document.addEventListener('DOMContentLoaded', init);
</script>
