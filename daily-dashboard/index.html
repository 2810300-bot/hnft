<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐厨垃圾收运量数据可视化看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-primary: #f5f6fa;
            --bg-card: #ffffff;
            --bg-header: #1a1a2e;
            --bg-header-secondary: #16213e;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --text-on-dark: #e0e0e0;
            --accent: #4C72B0;
            --accent2: #DD8452;
            --accent3: #55A868;
            --accent4: #C44E52;
            --accent5: #8172B3;
            --positive: #28a745;
            --negative: #dc3545;
            --warning: #ffc107;
            --gap: 16px;
            --radius: 10px;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .dashboard-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: var(--gap);
        }

        /* Header */
        .dashboard-header {
            background: linear-gradient(135deg, var(--bg-header), var(--bg-header-secondary));
            color: var(--text-on-dark);
            padding: 24px 28px;
            border-radius: var(--radius);
            margin-bottom: var(--gap);
            position: relative;
            overflow: hidden;
        }
        .dashboard-header::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            border-radius: 50%;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
            position: relative;
            z-index: 1;
        }
        .header-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }
        .header-top h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header-meta {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }
        /* Breadcrumb */
        .breadcrumb-bar {
            background: var(--bg-card, #fff); border-bottom: 1px solid var(--border, #e2e8f0);
            padding: 10px 20px; display: flex; align-items: center;
            font-size: 13px; color: #64748b;
        }
        .breadcrumb-bar a { color: var(--primary, #4C72B0); text-decoration: none; font-weight: 500; }
        .breadcrumb-bar a:hover { text-decoration: underline; }
        .breadcrumb-bar .sep { color: #94a3b8; margin: 0 8px; }
        .refresh-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.12);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            white-space: nowrap;
        }
        .refresh-dot {
            width: 8px;
            height: 8px;
            background: var(--positive);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .next-update {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.08);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.65);
            white-space: nowrap;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* KPI Cards */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--gap);
            margin-bottom: var(--gap);
        }
        .kpi-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }
        .kpi-card:hover { transform: translateY(-2px); }
        .kpi-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }
        .kpi-unit {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-left: 2px;
        }
        .kpi-change {
            font-size: 13px;
            font-weight: 600;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .kpi-change.positive { color: var(--positive); }
        .kpi-change.negative { color: var(--negative); }
        .kpi-change.neutral { color: var(--text-secondary); }
        .kpi-sub {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Module Tabs */
        .module-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: var(--gap);
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 4px;
            box-shadow: var(--shadow);
        }
        .module-tab {
            flex: 1;
            padding: 10px 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            color: var(--text-secondary);
            user-select: none;
            border: none;
            background: transparent;
        }
        .module-tab:hover {
            color: var(--text-primary);
            background: #f0f2f5;
        }
        .module-tab.active {
            color: #fff;
            background: var(--accent);
            font-weight: 600;
        }

        /* Module Content */
        .module-content {
            display: none;
        }
        .module-content.active {
            display: block;
        }

        /* Chart Rows */
        .chart-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: var(--gap);
            margin-bottom: var(--gap);
        }
        .chart-row.single {
            grid-template-columns: 1fr;
        }
        .chart-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
        }
        .chart-container.wide {
            grid-column: 1 / -1;
        }
        .chart-container h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .chart-wrapper {
            position: relative;
            height: 320px;
        }
        .chart-wrapper.tall {
            height: 380px;
        }

        /* Data Table */
        .table-section {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            overflow-x: auto;
            margin-bottom: var(--gap);
        }
        .table-section h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .data-table thead th {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 2px solid #dee2e6;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        .data-table thead th:hover { color: var(--text-primary); }
        .data-table tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .data-table tbody tr:hover { background: #f8f9fa; }
        .data-table tbody tr:last-child td { border-bottom: none; }
        .severity-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .severity-HIGH { background: #fde8e8; color: #c81e1e; }
        .severity-MEDIUM { background: #fef3c7; color: #b45309; }
        .severity-LOW { background: #e0f2fe; color: #0369a1; }

        /* Anomaly type tags */
        .anomaly-type-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: #f0f0f0;
            color: #555;
        }

        /* Weekly Report Text */
        .report-text {
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-primary);
        }
        .report-text h2, .report-text h3 {
            margin-top: 16px;
            margin-bottom: 8px;
        }
        .report-text table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
        }
        .report-text table th,
        .report-text table td {
            border: 1px solid #dee2e6;
            padding: 8px 12px;
            text-align: left;
            font-size: 13px;
        }
        .report-text table th {
            background: #f8f9fa;
            font-weight: 600;
        }

        /* Filters */
        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: var(--gap);
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-group label {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .filter-group select,
        .filter-group input {
            padding: 6px 10px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text-primary);
            background: #fff;
        }

        /* Footer */
        .dashboard-footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
            .chart-row { grid-template-columns: 1fr; }
            .header-top { flex-direction: column; }
            .kpi-value { font-size: 24px; }
            .module-tabs { flex-direction: column; }
        }

        @media print {
            body { background: #fff; }
            .module-tabs, .filter-bar { display: none; }
            .module-content { display: block !important; }
            .kpi-card, .chart-container, .table-section { box-shadow: none; border: 1px solid #dee2e6; break-inside: avoid; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }

        /* Loading shimmer */
        .shimmer {
            animation: shimmer 1.5s infinite;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body>
    <!-- Breadcrumb -->
    <div class="breadcrumb-bar">
        <div>
            <a href="../">🏠 看板中心</a>
            <span class="sep">/</span>
            <span>餐厨垃圾收运量数据可视化看板</span>
        </div>
    </div>

    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-top">
                <div>
                    <h1>📊 餐厨垃圾收运量数据可视化看板</h1>
                    <div class="header-meta">岳阳市厨余垃圾资源化利用和无害化处置项目</div>
                </div>
                <div class="header-actions">
                    <div class="refresh-badge">
                    <span class="refresh-dot"></span>
                    数据更新: <span id="data-date">2026-06-28 11:28</span>
                </div>
                    <div class="next-update" id="next-update-container">
                        下次更新: <span id="next-update">--</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- KPI Cards -->
        <section class="kpi-row" id="kpi-row">
            <div class="kpi-card">

            <div class="kpi-card">

        <!-- Module Tabs -->
        <nav class="module-tabs">

        </nav>

        <!-- Module 1: 数据量分析 -->
        <section class="module-content active" id="module-volume">
            <div class="filter-bar">
                <div class="filter-group">
                    <label>时间范围</label>
                    <select id="filter-period" onchange="updateCharts()">
                        <option value="all">全部数据</option>
                        <option value="30">最近30天</option>
                        <option value="14" selected>最近14天</option>
                        <option value="7">最近7天</option>
                    </select>
                </div>
            </div>
            <div class="chart-row">
                <div class="chart-container wide">
                    <h3>每日收运量趋势</h3>
                    <div class="chart-wrapper tall"><canvas id="chart-daily-trend"></canvas></div>
                </div>
            </div>
            <div class="chart-row">
                <div class="chart-container">
                    <h3>周度收运量对比</h3>
                    <div class="chart-wrapper"><canvas id="chart-weekly-bar"></canvas></div>
                </div>
                <div class="chart-container">
                    <h3>工作日 vs 周末 vs 节假日 日均对比</h3>
                    <div class="chart-wrapper"><canvas id="chart-type-comparison"></canvas></div>
                </div>
            </div>
            <div class="chart-row">
                <div class="chart-container">
                    <h3>异常频发的单位排名</h3>
                    <div class="chart-wrapper"><canvas id="chart-unit-anomaly"></canvas></div>
                </div>
                <div class="chart-container">
                    <h3>收运车次趋势</h3>
                    <div class="chart-wrapper"><canvas id="chart-trip-trend"></canvas></div>
                </div>
            </div>
        </section>

        <!-- Module 2: 异常分析 -->
        <section class="module-content" id="module-anomaly">
            <div class="filter-bar">
                <div class="filter-group">
                    <label>严重度</label>
                    <select id="filter-severity" onchange="renderAnomalyTable()">
                        <option value="all">全部</option>
                        <option value="HIGH">高危</option>
                        <option value="MEDIUM">中危</option>
                        <option value="LOW">低危</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>时间范围</label>
                    <select id="filter-anomaly-period" onchange="renderAnomalyTable()">
                        <option value="all">全部</option>
                        <option value="7" selected>最近7天</option>
                        <option value="14">最近14天</option>
                        <option value="30">最近30天</option>
                    </select>
                </div>
                <div class="filter-group" style="margin-left: auto;">
                    <span id="anomaly-count" style="font-size: 13px; color: var(--text-secondary);"></span>
                </div>
            </div>
            <div class="chart-row">
                <div class="chart-container">
                    <h3>异常严重度分布</h3>
                    <div class="chart-wrapper"><canvas id="chart-severity-pie"></canvas></div>
                </div>
                <div class="chart-container">
                    <h3>每日异常数量趋势</h3>
                    <div class="chart-wrapper"><canvas id="chart-anomaly-trend"></canvas></div>
                </div>
            </div>
            <div class="table-section">
                <h3>异常明细列表</h3>
                <div id="anomaly-table-container"></div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="dashboard-footer">
            <p>&copy; 2026 湖南伏泰环境科技有限责任公司</p>
        </footer>
    </div>

                        grid: { drawOnChartArea: false },
                        beginAtZero: false,
                    },
                }
            }
        });

        // 周度对比柱状图
        const weekKeys = Object.keys(WEEKLY_DATA);
        const weekLabels = weekKeys.map(k => WEEKLY_DATA[k].label);
        const weekTotals = weekKeys.map(k => WEEKLY_DATA[k].week_total);
        const weekAvgs = weekKeys.map(k => WEEKLY_DATA[k].week_avg);

        charts.weeklyBar = new Chart(document.getElementById('chart-weekly-bar'), {
            type: 'bar',
            data: {
                labels: weekLabels,
                datasets: [{
                    label: '周总量',
                    data: weekTotals,
                    backgroundColor: COLORS.map(c => c + 'CC'),
                    borderColor: COLORS,
                    borderWidth: 1.5,
                    borderRadius: 6,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: { label: ctx => '周总量: ' + formatWeight(ctx.parsed.y) }
                    }
                },
                scales: {
                    x: { grid: { display: false } },
                    y: {
                        ticks: { callback: v => (v/1000).toFixed(0) + 't' },
                        title: { display: true, text: 'kg' }
                    }
                }
            }
        });

        // 工作日 vs 周末 vs 节假日 对比
        const typeData = { '工作日': { total: 0, count: 0 }, '周末': { total: 0, count: 0 }, '节假日': { total: 0, count: 0 } };
        dailyEntries.forEach(e => {
            if (!e[1].date_obj) return;
            const dt = new Date(e[1].date_obj);
            const mStr = String(dt.getMonth() + 1).padStart(2, '0');
            const dStr = String(dt.getDate()).padStart(2, '0');
            const key = mStr + '/' + dStr;
            if (key === '06/19') {
                typeData['节假日'].total += e[1].total;
                typeData['节假日'].count += 1;
            } else if (dt.getDay() === 0 || dt.getDay() === 6) {
                typeData['周末'].total += e[1].total;
                typeData['周末'].count += 1;
            } else {
                typeData['工作日'].total += e[1].total;
                typeData['工作日'].count += 1;
            }
        });
        const typeLabels = Object.keys(typeData);
        const typeAvgs = typeLabels.map(t => typeData[t].count > 0 ? typeData[t].total / typeData[t].count : 0);

        charts.typeComparison = new Chart(document.getElementById('chart-type-comparison'), {
            type: 'bar',
            data: {
                labels: typeLabels,
                datasets: [{
                    label: '日均收运量 (kg)',
                    data: typeAvgs,
                    backgroundColor: typeLabels.map(t => (DAY_TYPE_COLORS[t] || '#888') + 'CC'),
                    borderColor: typeLabels.map(t => DAY_TYPE_COLORS[t] || '#888'),
                    borderWidth: 1.5,
                    borderRadius: 6,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                const t = typeLabels[ctx.dataIndex];
                                const cnt = typeData[t].count;
                                return '日均: ' + formatWeight(ctx.parsed.x) + ' | ' + cnt + '天';
                            }
                        }
                    }
                },
                scales: {
                    x: { ticks: { callback: v => (v/1000).toFixed(0) + 't' } }
                }
            }
        });

        // 异常频发单位排名
        const unitLabels = Object.keys(UNIT_DATA).sort((a, b) => UNIT_DATA[b].count - UNIT_DATA[a].count);
        const unitCounts = unitLabels.map(u => UNIT_DATA[u].count);

        charts.unitAnomaly = new Chart(document.getElementById('chart-unit-anomaly'), {
            type: 'bar',
            data: {
                labels: unitLabels,
                datasets: [{
                    label: '异常次数',
                    data: unitCounts,
                    backgroundColor: COLORS.map(c => c + 'CC'),
                    borderColor: COLORS,
                    borderWidth: 1.5,
                    borderRadius: 6,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                plugins: { legend: { display: false } },
                scales: { x: { title: { display: true, text: '异常次数' } } }
            }
        });

        // 车次趋势
        charts.tripTrend = new Chart(document.getElementById('chart-trip-trend'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '车次',
                    data: counts,
                    borderColor: '#8172B3',
                    backgroundColor: '#8172B320',
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: '#8172B3',
                    tension: 0.3,
                    fill: true,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { callbacks: { label: ctx => '车次: ' + ctx.parsed.y + ' 趟' } }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { maxRotation: 45, font: { size: 10 } } },
                    y: { title: { display: true, text: '车次' }, beginAtZero: false },
                }
            }
        });
    }

    function renderSeverityPie() {
        const counts = { HIGH: 0, MEDIUM: 0, LOW: 0 };
        ALL_ANOMALIES.forEach(a => { counts[a.severity] = (counts[a.severity] || 0) + 1; });

        charts.severityPie = new Chart(document.getElementById('chart-severity-pie'), {
            type: 'doughnut',
            data: {
                labels: ['高危', '中危', '低危'],
                datasets: [{
                    data: [counts.HIGH, counts.MEDIUM, counts.LOW],
                    backgroundColor: ['#C44E52CC', '#DD8452CC', '#4C72B0CC'],
                    borderColor: '#fff',
                    borderWidth: 2,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '60%',
                plugins: {
                    legend: { position: 'right', labels: { usePointStyle: true, padding: 15 } },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                const total = ctx.dataset.data.reduce((a,b) => a+b, 0);
                                const pct = total > 0 ? (ctx.parsed / total * 100).toFixed(1) : 0;
                                return ctx.label + ': ' + ctx.parsed + ' 项 (' + pct + '%)';
                            }
                        }
                    }
                }
            }
        });

        // 每日异常趋势
        const anomalyDates = Object.keys(DATE_ANOMALY_COUNTS).sort((a, b) => {
            const ma = a.match(/(\d+)月(\d+)日/), mb = b.match(/(\d+)月(\d+)日/);
            if (!ma || !mb) return 0;
            return (parseInt(ma[1])*100+parseInt(ma[2])) - (parseInt(mb[1])*100+parseInt(mb[2]));
        });
        const anomalyLabels = anomalyDates.map(d => {
            const m = d.match(/(\d+)月(\d+)日/);
            return m ? m[1]+'/'+m[2] : d;
        });
        const highData = anomalyDates.map(d => DATE_ANOMALY_COUNTS[d].high || 0);
        const mediumData = anomalyDates.map(d => DATE_ANOMALY_COUNTS[d].medium || 0);
        const lowData = anomalyDates.map(d => DATE_ANOMALY_COUNTS[d].low || 0);

        charts.anomalyTrend = new Chart(document.getElementById('chart-anomaly-trend'), {
            type: 'bar',
            data: {
                labels: anomalyLabels,
                datasets: [
                    { label: '高危', data: highData, backgroundColor: '#C44E52CC', borderColor: '#C44E52', borderWidth: 1, borderRadius: { topLeft: 3, topRight: 3 } },
                    { label: '中危', data: mediumData, backgroundColor: '#DD8452CC', borderColor: '#DD8452', borderWidth: 1, borderRadius: { topLeft: 3, topRight: 3 } },
                    { label: '低危', data: lowData, backgroundColor: '#4C72B0CC', borderColor: '#4C72B0', borderWidth: 1, borderRadius: { topLeft: 3, topRight: 3 } },
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { stacked: true, grid: { display: false }, ticks: { maxRotation: 45, font: { size: 10 } } },
                    y: { stacked: true, title: { display: true, text: '异常项数' } },
                },
                plugins: {
                    legend: { position: 'top', labels: { usePointStyle: true, padding: 15 } },
                }
            }
        });
    }

    // ============================================================
    // 异常明细表渲染
    // ============================================================
    function renderAnomalyTable() {
        const severityFilter = document.getElementById('filter-severity').value;
        const periodFilter = document.getElementById('filter-anomaly-period').value;

        let filtered = [...ALL_ANOMALIES];

        if (severityFilter !== 'all') {
            filtered = filtered.filter(a => a.severity === severityFilter);
        }

        if (periodFilter !== 'all') {
            const days = parseInt(periodFilter);
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - days);
            filtered = filtered.filter(a => {
                if (!a.date_obj) return true;
                return new Date(a.date_obj) >= cutoff;
            });
        }

        // 按日期倒序，严重度排序
        filtered.sort((a, b) => {
            if (a.date_obj && b.date_obj) {
                const dc = new Date(b.date_obj) - new Date(a.date_obj);
                if (dc !== 0) return dc;
            }
            const sevOrder = { 'HIGH': 0, 'MEDIUM': 1, 'LOW': 2 };
            return sevOrder[a.severity] - sevOrder[b.severity];
        });

        document.getElementById('anomaly-count').textContent = '共 ' + filtered.length + ' 条异常';

        let html = `<table class="data-table">
            <thead><tr>
                <th>日期</th><th>严重度</th><th>异常类型</th><th>详情</th><th>数值</th><th>基准/原因</th>
            </tr></thead><tbody>`;

        filtered.forEach(a => {
            html += `<tr>
                <td>${a.date || '-'}</td>
                <td><span class="severity-badge severity-${a.severity}">${a.severity === 'HIGH' ? '🔴 高危' : a.severity === 'MEDIUM' ? '🟡 中危' : '🔵 低危'}</span></td>
                <td><span class="anomaly-type-tag">${a.type || '-'}</span></td>
                <td style="max-width: 250px; overflow: hidden; text-overflow: ellipsis;" title="${(a.field || '')}">${a.field || '-'}</td>
                <td>${a.value || '-'}</td>
                <td style="max-width: 300px; font-size: 12px; color: var(--text-secondary);" title="${(a.possible_cause || '')}">${(a.baseline || a.possible_cause || '-')}</td>
            </tr>`;
        });

        if (filtered.length === 0) {
            html += '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-secondary);">✅ 无匹配异常记录</td></tr>';
        }

        html += '</tbody></table>';
        document.getElementById('anomaly-table-container').innerHTML = html;
    }

    // ============================================================
    // 模块切换
    // ============================================================
    function switchModule(name) {
        document.querySelectorAll('.module-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.module-content').forEach(m => m.classList.remove('active'));

        document.querySelector(`[onclick="switchModule('${name}')"]`).classList.add('active');
        document.getElementById('module-' + name).classList.add('active');

        if (name === 'anomaly') {
            renderSeverityPie();
            renderAnomalyTable();
        }
    }

    function updateCharts() {
        const period = document.getElementById('filter-period').value;
        renderAllCharts(period);
    }

    // ============================================================
    // 自动刷新模块 (v1.0)
    // ============================================================
    const AutoRefresh = (function() {
        const C = {
            intervalMs: 60 * 60 * 1000,
            activityThrottleMs: 3000,
            maxDelayCount: 12,
            storageKey: 'dash_state',
            logKey: 'dash_refresh_log',
        };
        let timerId = null, delayCount = 0, refreshing = false, lastActive = 0;

        function onActivity() { lastActive = Date.now(); }

        function isActive() {
            if (Date.now() - lastActive < 500) return true;
            const el = document.activeElement;
            if (el && (el.tagName === 'INPUT' || el.tagName === 'SELECT' || el.tagName === 'TEXTAREA' || el.isContentEditable)) return true;
            return document.querySelector('.modal-open, .popup-open') !== null;
        }

        function saveState() {
            try {
                const s = {
                    tab: document.querySelector('.module-tab.active')?.getAttribute('onclick')?.match(/'([^']+)'/)?.[1] || 'volume',
                    period: document.getElementById('filter-period')?.value || '14',
                    scrollY: window.scrollY,
                    savedAt: Date.now(),
                };
                localStorage.setItem(C.storageKey, JSON.stringify(s));
            } catch(e) {}
        }

        function restoreState() {
            try {
                const s = JSON.parse(localStorage.getItem(C.storageKey));
                if (!s) return;
                if (s.tab) switchModule(s.tab);
                const f = document.getElementById('filter-period');
                if (f && s.period) { f.value = s.period; updateCharts(); }
                if (s.scrollY) setTimeout(() => window.scrollTo(0, s.scrollY), 100);
            } catch(e) {}
        }

        function log(msg) {
            try {
                const logs = JSON.parse(localStorage.getItem(C.logKey) || '[]');
                logs.push({ ts: new Date().toLocaleTimeString('zh-CN'), msg });
                if (logs.length > 30) logs.shift();
                localStorage.setItem(C.logKey, JSON.stringify(logs));
            } catch(e) {}
        }

        function showToast(msg, buttons) {
            let t = document.getElementById('refresh-toast');
            if (t) t.remove();
            t = document.createElement('div');
            t.id = 'refresh-toast';
            t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#1a1a2e;color:#e0e0e0;padding:14px 18px;border-radius:8px;z-index:99999;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,0.4);display:flex;align-items:center;gap:10px;transition:opacity 0.3s;';
            t.innerHTML = `<span>${msg}</span><span>${buttons || ''}</span>`;
            document.body.appendChild(t);
            return t;
        }

        async function doRefresh() {
            if (refreshing) return;
            refreshing = true;
            log('刷新开始');
            saveState();
            const sep = window.location.href.includes('?') ? '&' : '?';
            const url = window.location.href.split('#')[0].split('?')[0] + sep + '_cb=' + Date.now();
            window.location.href = url;
        }

        function checkRefresh() {
            if (!navigator.onLine) {
                log('离线，跳过');
                showToast('⚠️ 网络离线，刷新已暂停', '');
                return;
            }
            if (isActive()) {
                delayCount++;
                log('用户活跃，推迟(' + delayCount + '/' + C.maxDelayCount + ')');
                if (delayCount <= C.maxDelayCount) {
                    const toast = showToast(
                        '📊 页面有更新，检测到您正在查看',
                        '<button onclick="AutoRefresh.forceNow()" style="background:#4C72B0;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;margin-right:4px;">立即</button>' +
                        '<button onclick="AutoRefresh.delay5()" style="background:#6c757d;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;">5分钟</button>'
                    );
                    setTimeout(() => { if (toast && toast.parentNode) toast.style.opacity = '0'; }, 8000);
                    return;
                }
            }
            delayCount = 0;
            doRefresh();
        }

        function start() {
            if (timerId) clearInterval(timerId);
            timerId = setInterval(checkRefresh, C.intervalMs);
            ['mousedown','keydown','touchstart','scroll'].forEach(e =>
                document.addEventListener(e, onActivity, { passive: true })
            );
            window.addEventListener('online', () => { log('网络恢复'); if (!timerId) start(); });
            window.addEventListener('offline', () => log('网络断开'));
            log('自动刷新已启动，间隔' + (C.intervalMs/60000) + '分钟');
        }

        return {
            init: function() {
                restoreState();
                start();
                window.AutoRefresh = {
                    forceNow: () => { document.getElementById('refresh-toast')?.remove(); doRefresh(); },
                    delay5: () => { document.getElementById('refresh-toast')?.remove(); log('推迟5分钟'); setTimeout(checkRefresh, 5*60*1000); },
                    status: () => ({
                        running: timerId !== null,
                        intervalMin: C.intervalMs/60000,
                        delayCount,
                        online: navigator.onLine,
                    }),
                };
            },
            restore: restoreState,
        };
    })();

    // ============================================================
    // 初始化
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        renderKPIs();
        renderAllCharts('14');
        renderAnomalyTable();
        renderSeverityPie();
        AutoRefresh.init();
        
        // 计算并显示下次更新时间（每日 06:00）
        (function updateNextUpdate() {
            const now = new Date();
            let next = new Date(now);
            next.setHours(6, 0, 0, 0);
            if (now >= next) {
                next.setDate(next.getDate() + 1);
            }
            const el = document.getElementById('next-update');
            if (el) {
                el.textContent = next.toLocaleString('zh-CN', {
                    month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', hour12: false
                });
            }
            // 每小时刷新一次显示
            setTimeout(updateNextUpdate, 60*60*1000);
        })();
    });
    </script>
