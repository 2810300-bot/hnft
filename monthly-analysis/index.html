  --text: #1e293b;
  --text-secondary: #64748b;
  --text-light: #e2e8f0;
  --border: #e2e8f0;

  --radius: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.1), 0 8px 32px rgba(0,0,0,0.08);
  --accent-blue: #4C72B0;
  --accent-green: #16a34a;

* { margin: 0; padding: 0; box-sizing: border-box; }
body {

  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;

/* Breadcrumb */
.breadcrumb-bar {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  font-size: 13px;
  color: var(--text-secondary);
}
.breadcrumb-bar a { color: var(--accent-blue); text-decoration: none; font-weight: 500; }
.breadcrumb-bar a:hover { text-decoration: underline; }
.breadcrumb-bar .sep { color: #94a3b8; margin: 0 8px; }

/* Month Navigation Tabs */
.month-nav {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.month-nav::-webkit-scrollbar { height: 4px; }
.month-nav::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
.month-tab {
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  border: none;
  background: transparent;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: all 0.2s ease;
  position: relative;
}
.month-tab:hover { color: var(--accent-blue); background: #f8fafc; }
.month-tab.active {
  color: var(--accent-blue);
  border-bottom-color: var(--accent-blue);
  font-weight: 700;
}
.month-tab .badge {
  display: inline-block;
  margin-left: 6px;
  padding: 1px 6px;
  font-size: 10px;
  font-weight: 600;
  border-radius: 10px;
  background: #e2e8f0;
  color: var(--text-secondary);
}
.month-tab.active .badge { background: #dbeafe; color: var(--accent-blue); }
.month-tab.summary-tab { font-weight: 600; }

/* Header */
.site-header {
  background: linear-gradient(135deg, var(--header-bg), var(--header-bg2));
  color: var(--text-light);
  padding: 32px 40px;
  position: relative;
  overflow: hidden;
}
.site-header::after {
  content: '';
  position: absolute;
  top: -30%; right: -5%;
  width: 360px; height: 360px;
  background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
  border-radius: 50%;
}
.header-content {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}
.header-content h1 { font-size: 26px; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
.header-content .subtitle { font-size: 13px; color: rgba(255,255,255,0.55); }
.header-meta {
  display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap;
  font-size: 12px; color: rgba(255,255,255,0.6);
}

/* Main */
.main-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 28px 24px 48px;
}

/* Section */
.section-title {
  font-size: 18px; font-weight: 700; color: var(--text);
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.section-subtitle {
  font-size: 15px; font-weight: 600; color: var(--text);
  margin: 20px 0 12px;
}

/* KPI Row */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}
.kpi-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  text-align: center;
  border-top: 3px solid transparent;
}
.kpi-card:nth-child(1) { border-top-color: var(--accent-blue); }
.kpi-card:nth-child(2) { border-top-color: var(--accent-green); }
.kpi-card:nth-child(3) { border-top-color: var(--accent-orange); }
.kpi-card:nth-child(4) { border-top-color: var(--accent-purple); }
.kpi-card .label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.kpi-card .value { font-size: 30px; font-weight: 700; color: var(--text); line-height: 1.2; }
.kpi-card .unit { font-size: 14px; color: var(--text-secondary); margin-left: 2px; font-weight: 400; }
.kpi-card .sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.kpi-card .sub.up { color: var(--accent-green); font-weight: 600; }
.kpi-card .sub.down { color: var(--accent-red); font-weight: 600; }

.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 28px;
}
.chart-grid .full { grid-column: 1 / -1; }
.chart-card {

  padding: 20px;
  box-shadow: var(--shadow);

.chart-card h3 {

  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border-light);
  color: var(--text);
}
.chart-card canvas { max-height: 320px; }

/* Tables */
.detail-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 8px;
}
.detail-table th {
  background: #f8fafc;
  text-align: left;
  padding: 10px 14px;
  font-weight: 600;
  color: var(--text-secondary);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 2px solid var(--border);

.detail-table td {

  border-bottom: 1px solid var(--border-light);
}
.detail-table tr:last-child td { border-bottom: none; }
.detail-table tr:hover td { background: #f8fafc; }

/* Table Card */
.table-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.table-card h3 {
  font-size: 14px; font-weight: 600;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border-light);
  color: var(--text);
}

/* Dual Table Row */
.dual-table {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 28px;
}

/* Footer */
.site-footer {
  text-align: center;
  padding: 32px 24px;
  color: var(--text-secondary);
  font-size: 12px;
  border-top: 1px solid var(--border);
  margin-top: 48px;
}

/* Responsive */
@media (max-width: 768px) {

.pending-alert {

/* Month panel visibility */
.month-panel { display: none; }

/* Summary specific styles */
.summary-highlight {

.growth-indicator.up { background: #dcfce7; color: var(--accent-green); }
.growth-indicator.down { background: #fee2e2; color: var(--accent-red); }

    subtitle.textContent = '岳阳市厨余垃圾资源化利用和无害化处置项目';
    meta.innerHTML = '<span>📅 统计周期: 1月1日 - 6月30日</span><span>🔢 已覆盖 6 个月数据</span><span>🔄 生成于 2026-07-01 07:52:37</span>';
  } else {
    const d = MONTHS_DATA[month];
    title.textContent = '📊 厨余垃圾收运量 · ' + d.label + '分析报告';
    subtitle.textContent = '岳阳市厨余垃圾资源化利用和无害化处置项目';
    meta.innerHTML = '<span>📅 报告月: ' + d.date_range + '</span><span>🔢 已加载 ' + d.data_days + '/' + d.days_in_month + ' 天数据</span><span>🔍 数据质量: ' + d.data_quality.quality_score + '/100</span><span>🔄 生成于 ' + d.generated_at + '</span>';
  }
}

function renderMonthCharts(d, hasDaily) {
  // 1. Weekly Breakdown
  (function() {
    const ctx = document.getElementById('chart-weekly-breakdown');
    if (!ctx) return;
    const wb = d.weekly_breakdown;
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: wb.map(w => '第' + w.week + '周'),
        datasets: [{
          label: '周收运量 (吨)',
          data: wb.map(w => w.total_ton),
          backgroundColor: wb.map(w => w.trend_color || '#4C72B0'),
          borderRadius: 8
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: false, title: { display: true, text: '吨' } } }
      }
    });
  })();
  
  // 2. Daily Trend (if available)
  if (hasDaily) {
    (function() {
      const ctx = document.getElementById('chart-daily-trend');
      if (!ctx) return;
      const daily = d.daily;
      const peakIdx = daily.findIndex(x => x.total_kg === d.peak.kg && !x.pending);
      const valleyIdx = daily.findIndex(x => x.total_kg === d.valley.kg && !x.pending);
      const pointColors = daily.map(function(x, i) {
        if (x.pending) return '#cbd5e1';
        if (i === peakIdx) return '#e15759';
        if (i === valleyIdx) return '#59a14f';
        return '#4C72B0';
      });
      const pointRadii = daily.map(function(x, i) {
        if (x.pending) return 2;
        if (i === peakIdx || i === valleyIdx) return 6;
        return 3;
      });
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: daily.map(x => x.date),
          datasets: [{
            label: '收运量 (吨)',
            data: daily.map(x => x.total_kg / 1000),
            borderColor: '#4C72B0',
            backgroundColor: 'rgba(76,114,176,0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: pointRadii,
            pointBackgroundColor: pointColors,
            pointBorderColor: pointColors
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: false, title: { display: true, text: '吨' } }, x: { ticks: { maxRotation: 45 } } }
        }
      });
    })();
  }
  
  // 3. Region Pie
  (function() {
    const ctx = document.getElementById('chart-region-pie');
    if (!ctx || d.regions.length === 0) return;
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: d.regions.map(r => r.name),
        datasets: [{
          data: d.regions.map(r => r.kg),
          backgroundColor: CHART_COLORS.slice(0, d.regions.length),
          borderWidth: 2,
          borderColor: '#fff'
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'bottom' } }
      }
    });
  })();
  
  // 4. Weekday Pattern
  (function() {
    const ctx = document.getElementById('chart-weekday-pattern');
    if (!ctx) return;
    const wp = d.weekday_pattern;
    const days = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
    const values = days.map(wd => wp[wd] ? wp[wd].avg_ton : 0);
    const colors = days.map(wd => wd === '周六' || wd === '周日' ? '#e15759' : '#4C72B0');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: days,
        datasets: [{
          label: '日均收运量 (吨)',
          data: values,
          backgroundColor: colors,
          borderRadius: 6
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: false, title: { display: true, text: '吨/日' } } }
      }
    });
  })();
}

  // Bind tab click events
  document.querySelectorAll('.month-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      const month = this.getAttribute('data-month');
      switchMonth(month);

  // Default to summary
  switchMonth('summary');
});
