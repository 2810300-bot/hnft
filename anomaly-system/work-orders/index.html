.order-right { text-align:right; }
.order-right .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; margin-bottom:6px; }
.badge-pending { background:#fef3c7; color:#92400e; }
.badge-in_progress { background:#dbeafe; color:#1e40af; }
.badge-resolved { background:#dcfce7; color:#166534; }
.badge-dismissed { background:#f3f4f6; color:#6b7280; }
.badge-severe { background:#fee2e2; color:#991b1b; }
.badge-moderate { background:#fff7ed; color:#9a3412; }
.badge-mild { background:#fef9c3; color:#854d0e; }
.order-right .deviation { font-size:18px; font-weight:700; }
.deviation-up { color:var(--red); }
.deviation-down { color:var(--green); }

.detail-panel { display:none; background:var(--card-bg); border-radius:var(--radius); padding:24px; margin:12px 0; box-shadow:var(--shadow); }
.detail-panel.active { display:block; }
.detail-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin-bottom:16px; }
.detail-item { }
.detail-item .label { font-size:12px; color:var(--text2); }
.detail-item .val { font-size:15px; font-weight:500; }

.history-line { padding:8px 0; border-bottom:1px solid #f0f0f0; font-size:13px; }

.empty .icon { font-size:48px; margin-bottom:12px; }
.footer { text-align:center; color:var(--text2); font-size:12px; padding:24px; }

function renderStatusChart() {
    const ctx = document.getElementById('status-chart').getContext('2d');
    const labels = ['待处理','处理中','已闭环','已驳回'];
    const data = [
        WORK_ORDERS.filter(w=>w.status==='pending').length,
        WORK_ORDERS.filter(w=>w.status==='in_progress').length,
        WORK_ORDERS.filter(w=>w.status==='resolved').length,
        WORK_ORDERS.filter(w=>w.status==='dismissed').length,
    ];
    const colors = ['#eab308','#4C72B0','#16a34a','#9ca3af'];
    if (statusChart) statusChart.destroy();
    statusChart = new Chart(ctx, {
        type:'doughnut',
        data:{labels,datasets:[{data,backgroundColor:colors,borderColor:'#fff',borderWidth:2}]},
        options:{responsive:true,maintainAspectRatio:true,cutout:'60%',plugins:{legend:{position:'right',labels:{usePointStyle:true,padding:15}}}}
    });
}

function applyFilters() {
    const status = document.getElementById('filter-status').value;
    const level = document.getElementById('filter-level').value;
    const region = document.getElementById('filter-region').value;
    const search = document.getElementById('filter-search').value.toLowerCase();

    filtered = WORK_ORDERS.filter(w => {
        if (status !== 'all' && w.status !== status) return false;
        if (level !== 'all' && w.level !== level) return false;
        if (region !== 'all' && w.region !== region) return false;
        if (search && !w.merchant_name.toLowerCase().includes(search) && !w.id.toLowerCase().includes(search)) return false;
        return true;
    });

    // Sort by created_at desc
    filtered.sort((a,b) => b.created_at.localeCompare(a.created_at));

    renderList();

            <div class="detail-panel" id="detail-${w.id}">
                <div class="detail-grid">
                    <div class="detail-item"><div class="label">商户名称</div><div class="val">${w.merchant_name}</div></div>
                    <div class="detail-item"><div class="label">区域</div><div class="val">${w.region||'-'}</div></div>
                    <div class="detail-item"><div class="label">收运日期</div><div class="val">${w.collection_date}</div></div>
                    <div class="detail-item"><div class="label">实际收运量</div><div class="val">${w.actual_weight_kg} kg</div></div>
                    <div class="detail-item"><div class="label">基准产生量</div><div class="val">${w.baseline_weight_kg} kg</div></div>
                    <div class="detail-item"><div class="label">偏差比例</div><div class="val ${devClass}">${w.deviation_direction}${Math.abs(w.deviation_pct).toFixed(1)}%</div></div>
                    <div class="detail-item"><div class="label">异常类型</div><div class="val">${w.anomaly_type === 'missing' ? '未收运' : (w.deviation_direction === '偏高' ? '超量' : '减量')}</div></div>
                    <div class="detail-item"><div class="label">责任人</div><div class="val">${w.assigned_to||'-'} (${w.assigned_dept||'-'})</div></div>
                    <div class="detail-item"><div class="label">备份责任人</div><div class="val">${w.backup||'-'}</div></div>
                    ${w.resolution_notes ? `<div class="detail-item"><div class="label">处理说明</div><div class="val">${w.resolution_notes}</div></div>` : ''}
                </div>
                <div style="font-size:13px;font-weight:600;margin-bottom:8px;">状态变更历史</div>
                ${(w.status_history||[]).map(h => `
                    <div class="history-line">
                        <span class="st badge-${h.status}">${STATUS_LABELS[h.status]||h.status}</span>
                        <span class="ts">${h.timestamp}</span>
                        <span style="color:var(--text2)">by ${h.operator}</span>
                    </div>
                `).join('')}
            </div>
        </div>`;
    }).join('');
}

init();
</script>
</body>
</html>
